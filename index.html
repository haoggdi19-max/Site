<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tải Cấu Hình iPhone</title>
    <style>
        /* Giao diện nền tối sang trọng */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle, #1e3a8a, #0f172a);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
        }

        /* Khung nội dung chính */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo { width: 60px; margin-bottom: 20px; }

        h1 { font-size: 24px; margin-bottom: 10px; font-weight: 600; }

        p { font-size: 14px; color: #cbd5e1; line-height: 1.6; margin-bottom: 20px; }

        /* Nút tải xuống */
        .btn-download {
            display: block;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            margin-bottom: 20px;
        }

        .btn-download:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        .contact-info {
            font-size: 13px;
            color: #94a3b8;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
        }

        .contact-info b { color: #fff; }
    </style>
</head>
